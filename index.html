<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGI - Gestión de Incapacidades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sistema de Gestión de Incapacidades (IA)</h1>
        
        <form id="formIncapacidad">
            <input type="text" id="nombre" placeholder="Nombre del Colaborador">
            <input type="text" id="diagnostico" placeholder="Ej: Gripe, Accidente laboral...">
            <input type="number" id="dias" placeholder="Número de días">
            
            <div class="botones">
                <button type="button" onclick="analizarIA()">Analizar e Ingresar</button>
                <button type="button" onclick="nuevaIncapacidad()">Nueva Incapacidad</button>
            </div>
        </form>

        <div id="aiResponse" class="resultado">Esperando datos para análisis...</div>

        <section class="card-historial">
            <h3><i class="fas fa-history"></i> Historial de Gestiones (Seguimiento)</h3>
            <table id="tablaIncapacidades">
                <thead>
                    <tr>
                        <th>Colaborador</th>
                        <th>Origen / Diagnóstico</th>
                        <th>Días</th>
                        <th>Estado IA</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    </tbody>
            </table>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
