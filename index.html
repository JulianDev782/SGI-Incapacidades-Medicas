<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SGI AI - Gestión de Incapacidades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <h2>SGI</h2>
        <button class="btn-nuevo-sidebar" onclick="nuevaIncapacidad()">+ Nueva Incapacidad</button>
        <ul class="menu-list">
            <li class="active">Dashboard</li>
            <li>Incapacidades</li>
            <li>Colaboradores</li>
            <li>Reportes</li>
        </ul>
    </aside>

    <main class="main-content">
        <header>
            <h1>Dashboard de Control de Incapacidades</h1>
            <div style="color: #607d8b;">Auxiliar GH - Pereira 👤</div>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><h4>Total Incapacidades</h4><p id="totalCount">0</p></div>
            <div class="stat-card"><h4>Pendientes</h4><p id="pendingCount">0</p></div>
            <div class="stat-card"><h4>En Revisión</h4><p id="reviCount">0</p></div>
            <div class="stat-card"><h4>Aprobadas</h4><p id="approvedCount">0</p></div>
        </section>

        <section class="card">
            <h3>Registro de Datos</h3>
            <div class="form-row">
                <input type="text" id="nombre" placeholder="Nombre del Colaborador">
                <input type="text" id="diagnostico" placeholder="Origen / Diagnóstico">
                <input type="number" id="dias" placeholder="Días">
            </div>
            <button class="btn-analizar" onclick="analizarIA()">Analizar e Ingresar</button>
            <div id="aiResponse" style="margin-top:15px; font-style:italic; color:#546e7a;">Esperando datos...</div>
        </section>

        <section class="card">
            <h3>Últimas Incapacidades</h3>
            <table>
                <thead>
                    <tr><th>Colaborador</th><th>Diagnóstico</th><th>Días</th><th>Estado IA</th></tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
